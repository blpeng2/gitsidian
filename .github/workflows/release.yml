name: Build macOS App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install npm dependencies
        run: npm ci
      
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
      
      - name: Build web app
        env:
          VITE_OAUTH_CLIENT_ID: ${{ secrets.VITE_OAUTH_CLIENT_ID }}
        run: VITE_BASE_PATH=./ npm run build -- --outDir GitsidianApp/Resources/web
      
      - name: Build and bundle (arm64)
        run: |
          cd GitsidianApp
          # Download Sparkle.framework for direct linking (SPM+Sparkle incompatible with path: ".")
          if [ ! -d "SparkleFramework/Sparkle.framework" ]; then
            mkdir -p SparkleFramework
            VER=$(curl -s https://api.github.com/repos/sparkle-project/Sparkle/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
            curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${VER}/Sparkle-${VER}.tar.xz" -o /tmp/sparkle.tar.xz
            mkdir -p /tmp/sparkle_extract
            tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle_extract
            MACOS_FW=$(find /tmp/sparkle_extract -path "*/macos*/Sparkle.framework" | head -1)
            [ -z "$MACOS_FW" ] && MACOS_FW=$(find /tmp/sparkle_extract -name "Sparkle.framework" | head -1)
            cp -R "$MACOS_FW" SparkleFramework/
            rm -rf /tmp/sparkle_extract /tmp/sparkle.tar.xz
          fi
          mkdir -p ../SparkleFramework
          cp -R SparkleFramework/Sparkle.framework ../SparkleFramework/
          swift build -c release --triple arm64-apple-macosx
          
          BUNDLE_DIR="Gitsidian.app"
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR/Contents/MacOS"
          mkdir -p "$BUNDLE_DIR/Contents/Resources"
          
          cp ".build/arm64-apple-macosx/release/GitsidianApp" "$BUNDLE_DIR/Contents/MacOS/GitsidianApp"
          cp -R "Resources/web" "$BUNDLE_DIR/Contents/Resources/web"
          
          python3 -c "
          import plistlib
          with open('Info.plist', 'rb') as f:
              plist = plistlib.load(f)
          plist['CFBundleExecutable'] = 'GitsidianApp'
          plist['CFBundlePackageType'] = 'APPL'
          plist['CFBundleShortVersionString'] = '${{ steps.version.outputs.VERSION }}'
          plist['NSHighResolutionCapable'] = True
          plist['NSMainNibFile'] = ''
          with open('$BUNDLE_DIR/Contents/Info.plist', 'wb') as f:
              plistlib.dump(plist, f)
          "
          
          echo -n "APPL????" > "$BUNDLE_DIR/Contents/PkgInfo"
          SPARKLE_FW="SparkleFramework/Sparkle.framework"
          if [ -n "$SPARKLE_FW" ]; then
            mkdir -p "$BUNDLE_DIR/Contents/Frameworks"
            cp -R "$SPARKLE_FW" "$BUNDLE_DIR/Contents/Frameworks/"
            install_name_tool -add_rpath "@executable_path/../Frameworks" "$BUNDLE_DIR/Contents/MacOS/GitsidianApp" 2>/dev/null || true
            codesign --force --deep --sign - "$BUNDLE_DIR/Contents/Frameworks/Sparkle.framework" 2>/dev/null || true
          fi
          codesign --force --sign - --options runtime "$BUNDLE_DIR"
          
          ditto -c -k --sequesterRsrc --keepParent Gitsidian.app Gitsidian-macOS-arm64.zip
          hdiutil create -volname "Gitsidian" -srcfolder Gitsidian.app -ov -format UDZO Gitsidian-macOS-arm64.dmg
          rm -rf "$BUNDLE_DIR"
      
      - name: Build and bundle (x86_64)
        run: |
          cd GitsidianApp
          # Download Sparkle.framework for direct linking (SPM+Sparkle incompatible with path: ".")
          if [ ! -d "SparkleFramework/Sparkle.framework" ]; then
            mkdir -p SparkleFramework
            VER=$(curl -s https://api.github.com/repos/sparkle-project/Sparkle/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
            curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${VER}/Sparkle-${VER}.tar.xz" -o /tmp/sparkle.tar.xz
            mkdir -p /tmp/sparkle_extract
            tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle_extract
            MACOS_FW=$(find /tmp/sparkle_extract -path "*/macos*/Sparkle.framework" | head -1)
            [ -z "$MACOS_FW" ] && MACOS_FW=$(find /tmp/sparkle_extract -name "Sparkle.framework" | head -1)
            cp -R "$MACOS_FW" SparkleFramework/
            rm -rf /tmp/sparkle_extract /tmp/sparkle.tar.xz
          fi
          mkdir -p ../SparkleFramework
          cp -R SparkleFramework/Sparkle.framework ../SparkleFramework/
          swift build -c release --triple x86_64-apple-macosx
          
          BUNDLE_DIR="Gitsidian.app"
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR/Contents/MacOS"
          mkdir -p "$BUNDLE_DIR/Contents/Resources"
          
          cp ".build/x86_64-apple-macosx/release/GitsidianApp" "$BUNDLE_DIR/Contents/MacOS/GitsidianApp"
          cp -R "Resources/web" "$BUNDLE_DIR/Contents/Resources/web"
          
          python3 -c "
          import plistlib
          with open('Info.plist', 'rb') as f:
              plist = plistlib.load(f)
          plist['CFBundleExecutable'] = 'GitsidianApp'
          plist['CFBundlePackageType'] = 'APPL'
          plist['CFBundleShortVersionString'] = '${{ steps.version.outputs.VERSION }}'
          plist['NSHighResolutionCapable'] = True
          plist['NSMainNibFile'] = ''
          with open('$BUNDLE_DIR/Contents/Info.plist', 'wb') as f:
              plistlib.dump(plist, f)
          "
          
          echo -n "APPL????" > "$BUNDLE_DIR/Contents/PkgInfo"
          SPARKLE_FW="SparkleFramework/Sparkle.framework"
          if [ -n "$SPARKLE_FW" ]; then
            mkdir -p "$BUNDLE_DIR/Contents/Frameworks"
            cp -R "$SPARKLE_FW" "$BUNDLE_DIR/Contents/Frameworks/"
            install_name_tool -add_rpath "@executable_path/../Frameworks" "$BUNDLE_DIR/Contents/MacOS/GitsidianApp" 2>/dev/null || true
            codesign --force --deep --sign - "$BUNDLE_DIR/Contents/Frameworks/Sparkle.framework" 2>/dev/null || true
          fi
          codesign --force --sign - --options runtime "$BUNDLE_DIR"
          
          ditto -c -k --sequesterRsrc --keepParent Gitsidian.app Gitsidian-macOS-x86_64.zip
          hdiutil create -volname "Gitsidian" -srcfolder Gitsidian.app -ov -format UDZO Gitsidian-macOS-x86_64.dmg
          rm -rf "$BUNDLE_DIR"

      - name: Sign archives and update appcast
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Download Sparkle CLI tools
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz" \
            -o sparkle.tar.xz
          tar -xJf sparkle.tar.xz
          SIGN_UPDATE=$(find . -name "sign_update" -maxdepth 4 2>/dev/null | head -1)
          chmod +x "$SIGN_UPDATE"

          # Write private key
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_priv.pem
          chmod 600 /tmp/sparkle_priv.pem

          ARM64_FILE="GitsidianApp/Gitsidian-macOS-arm64.zip"
          X86_FILE="GitsidianApp/Gitsidian-macOS-x86_64.zip"

          ARM64_SIG=$("$SIGN_UPDATE" "$ARM64_FILE" -f /tmp/sparkle_priv.pem | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          X86_SIG=$("$SIGN_UPDATE"  "$X86_FILE"  -f /tmp/sparkle_priv.pem | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          ARM64_SIZE=$(stat -f%z "$ARM64_FILE")
          X86_SIZE=$(stat  -f%z "$X86_FILE")
          rm -f /tmp/sparkle_priv.pem

          VERSION="${{ steps.version.outputs.VERSION }}"
          DATE=$(date -R)

          mkdir -p public
          cat > public/appcast.xml <<APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
              <channel>
                  <title>Gitsidian</title>
                  <link>https://blpeng2.github.io/gitsidian/appcast.xml</link>
                  <description>Gitsidian Updates</description>
                  <language>en</language>
                  <item>
                      <title>Gitsidian ${VERSION}</title>
                      <pubDate>${DATE}</pubDate>
                      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                      <enclosure
                          url="https://github.com/blpeng2/gitsidian/releases/download/v${VERSION}/Gitsidian-macOS-arm64.zip"
                          sparkle:version="${VERSION}"
                          sparkle:edSignature="${ARM64_SIG}"
                          length="${ARM64_SIZE}"
                          type="application/zip"
                          sparkle:os="macos"
                          sparkle:arch="arm64" />
                      <enclosure
                          url="https://github.com/blpeng2/gitsidian/releases/download/v${VERSION}/Gitsidian-macOS-x86_64.zip"
                          sparkle:version="${VERSION}"
                          sparkle:edSignature="${X86_SIG}"
                          length="${X86_SIZE}"
                          type="application/zip"
                          sparkle:os="macos"
                          sparkle:arch="x86_64" />
                  </item>
              </channel>
          </rss>
          APPCAST

          # Commit appcast to main (triggers deploy.yml → GitHub Pages update)
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add public/appcast.xml
          git diff --cached --quiet || git commit -m "chore: update appcast for v${VERSION}"
          git push origin HEAD:main

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Gitsidian-macOS
          path: |
            GitsidianApp/Gitsidian-macOS-arm64.zip
            GitsidianApp/Gitsidian-macOS-arm64.dmg
            GitsidianApp/Gitsidian-macOS-x86_64.zip
            GitsidianApp/Gitsidian-macOS-x86_64.dmg
          retention-days: 30
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Gitsidian v${{ steps.version.outputs.VERSION }}
          body: |
            ## Gitsidian macOS App v${{ steps.version.outputs.VERSION }}
            
            ### Download
            | File | Architecture | Format |
            |------|-------------|--------|
            | `Gitsidian-macOS-arm64.dmg` | Apple Silicon (M1/M2/M3/M4) | DMG |
            | `Gitsidian-macOS-arm64.zip` | Apple Silicon (M1/M2/M3/M4) | ZIP |
            | `Gitsidian-macOS-x86_64.dmg` | Intel Mac | DMG |
            | `Gitsidian-macOS-x86_64.zip` | Intel Mac | ZIP |
            
            Extract ZIP or mount DMG, then drag `Gitsidian.app` to Applications.
            
            **Requirements:** macOS 14 (Sonoma) or later
            
            > ⚠️ First launch: Right-click → Open (bypasses Gatekeeper for unsigned apps)
          files: |
            GitsidianApp/Gitsidian-macOS-arm64.zip
            GitsidianApp/Gitsidian-macOS-arm64.dmg
            GitsidianApp/Gitsidian-macOS-x86_64.zip
            GitsidianApp/Gitsidian-macOS-x86_64.dmg
          generate_release_notes: true
