name: Build macOS App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install npm dependencies
        run: npm ci
      
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
      
      - name: Build web app
        env:
          VITE_OAUTH_CLIENT_ID: ${{ secrets.VITE_OAUTH_CLIENT_ID }}
        run: VITE_BASE_PATH=/ npm run build -- --outDir GitsidianApp/Resources/web
      
      - name: Build Swift (arm64)
        run: |
          cd GitsidianApp
          swift build -c release --triple arm64-apple-macosx
      
      - name: Build Swift (x86_64)
        run: |
          cd GitsidianApp
          swift build -c release --triple x86_64-apple-macosx
      
      - name: Create universal binary and .app bundle
        run: |
          cd GitsidianApp
          APP_NAME="Gitsidian"
          BUNDLE_DIR="${APP_NAME}.app"
          
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR/Contents/MacOS"
          mkdir -p "$BUNDLE_DIR/Contents/Resources"
          
          # Create universal binary (arm64 + x86_64)
          lipo -create \
            ".build/arm64-apple-macosx/release/GitsidianApp" \
            ".build/x86_64-apple-macosx/release/GitsidianApp" \
            -output "$BUNDLE_DIR/Contents/MacOS/GitsidianApp"
          
          # Copy web resources
          cp -R "Resources/web" "$BUNDLE_DIR/Contents/Resources/web"
          
          # Create complete Info.plist
          python3 -c "
          import plistlib
          with open('Info.plist', 'rb') as f:
              plist = plistlib.load(f)
          plist['CFBundleExecutable'] = 'GitsidianApp'
          plist['CFBundlePackageType'] = 'APPL'
          plist['CFBundleShortVersionString'] = '${{ steps.version.outputs.VERSION }}'
          plist['NSHighResolutionCapable'] = True
          plist['NSMainNibFile'] = ''
          with open('$BUNDLE_DIR/Contents/Info.plist', 'wb') as f:
              plistlib.dump(plist, f)
          " 2>&1 || {
            # Fallback: copy Info.plist as-is if python fails
            cp Info.plist "$BUNDLE_DIR/Contents/Info.plist"
          }
          
          # PkgInfo
          echo -n "APPL????" > "$BUNDLE_DIR/Contents/PkgInfo"
          
          # Ad-hoc code sign
          codesign --force --sign - --options runtime "$BUNDLE_DIR"
          
          echo "✅ Created $BUNDLE_DIR"
      
      - name: Create ZIP
        run: |
          cd GitsidianApp
          ditto -c -k --sequesterRsrc --keepParent Gitsidian.app Gitsidian-macOS-universal.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gitsidian-macOS
          path: GitsidianApp/Gitsidian-macOS-universal.zip
          retention-days: 30
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Gitsidian v${{ steps.version.outputs.VERSION }}
          body: |
            ## Gitsidian macOS App v${{ steps.version.outputs.VERSION }}
            
            ### Download
            Download `Gitsidian-macOS-universal.zip`, extract, and drag `Gitsidian.app` to your Applications folder.
            
            **Requirements:** macOS 14 (Sonoma) or later
            **Architecture:** Universal (Apple Silicon + Intel)
            
            > ⚠️ First launch: Right-click → Open (bypasses Gatekeeper for unsigned apps)
          files: |
            GitsidianApp/Gitsidian-macOS-universal.zip
          generate_release_notes: true
