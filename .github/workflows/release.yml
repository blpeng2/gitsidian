name: Build macOS App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install npm dependencies
        run: npm ci
      
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
      
      - name: Build web app
        env:
          VITE_OAUTH_CLIENT_ID: ${{ secrets.VITE_OAUTH_CLIENT_ID }}
        run: VITE_BASE_PATH=/ npm run build -- --outDir GitsidianApp/Resources/web
      
      - name: Build and bundle (arm64)
        run: |
          cd GitsidianApp
          swift build -c release --triple arm64-apple-macosx
          
          BUNDLE_DIR="Gitsidian.app"
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR/Contents/MacOS"
          mkdir -p "$BUNDLE_DIR/Contents/Resources"
          
          cp ".build/arm64-apple-macosx/release/GitsidianApp" "$BUNDLE_DIR/Contents/MacOS/GitsidianApp"
          cp -R "Resources/web" "$BUNDLE_DIR/Contents/Resources/web"
          
          python3 -c "
          import plistlib
          with open('Info.plist', 'rb') as f:
              plist = plistlib.load(f)
          plist['CFBundleExecutable'] = 'GitsidianApp'
          plist['CFBundlePackageType'] = 'APPL'
          plist['CFBundleShortVersionString'] = '${{ steps.version.outputs.VERSION }}'
          plist['NSHighResolutionCapable'] = True
          plist['NSMainNibFile'] = ''
          with open('$BUNDLE_DIR/Contents/Info.plist', 'wb') as f:
              plistlib.dump(plist, f)
          "
          
          echo -n "APPL????" > "$BUNDLE_DIR/Contents/PkgInfo"
          codesign --force --sign - --options runtime "$BUNDLE_DIR"
          
          ditto -c -k --sequesterRsrc --keepParent Gitsidian.app Gitsidian-macOS-arm64.zip
          rm -rf "$BUNDLE_DIR"
      
      - name: Build and bundle (x86_64)
        run: |
          cd GitsidianApp
          swift build -c release --triple x86_64-apple-macosx
          
          BUNDLE_DIR="Gitsidian.app"
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR/Contents/MacOS"
          mkdir -p "$BUNDLE_DIR/Contents/Resources"
          
          cp ".build/x86_64-apple-macosx/release/GitsidianApp" "$BUNDLE_DIR/Contents/MacOS/GitsidianApp"
          cp -R "Resources/web" "$BUNDLE_DIR/Contents/Resources/web"
          
          python3 -c "
          import plistlib
          with open('Info.plist', 'rb') as f:
              plist = plistlib.load(f)
          plist['CFBundleExecutable'] = 'GitsidianApp'
          plist['CFBundlePackageType'] = 'APPL'
          plist['CFBundleShortVersionString'] = '${{ steps.version.outputs.VERSION }}'
          plist['NSHighResolutionCapable'] = True
          plist['NSMainNibFile'] = ''
          with open('$BUNDLE_DIR/Contents/Info.plist', 'wb') as f:
              plistlib.dump(plist, f)
          "
          
          echo -n "APPL????" > "$BUNDLE_DIR/Contents/PkgInfo"
          codesign --force --sign - --options runtime "$BUNDLE_DIR"
          
          ditto -c -k --sequesterRsrc --keepParent Gitsidian.app Gitsidian-macOS-x86_64.zip
          rm -rf "$BUNDLE_DIR"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Gitsidian-macOS
          path: |
            GitsidianApp/Gitsidian-macOS-arm64.zip
            GitsidianApp/Gitsidian-macOS-x86_64.zip
          retention-days: 30
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Gitsidian v${{ steps.version.outputs.VERSION }}
          body: |
            ## Gitsidian macOS App v${{ steps.version.outputs.VERSION }}
            
            ### Download
            | File | Architecture |
            |------|-------------|
            | `Gitsidian-macOS-arm64.zip` | Apple Silicon (M1/M2/M3/M4) |
            | `Gitsidian-macOS-x86_64.zip` | Intel Mac |
            
            Extract the ZIP and drag `Gitsidian.app` to your Applications folder.
            
            **Requirements:** macOS 14 (Sonoma) or later
            
            > ⚠️ First launch: Right-click → Open (bypasses Gatekeeper for unsigned apps)
          files: |
            GitsidianApp/Gitsidian-macOS-arm64.zip
            GitsidianApp/Gitsidian-macOS-x86_64.zip
          generate_release_notes: true
