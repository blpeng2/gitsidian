<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var theme = localStorage.getItem('gitsidian_theme');
        if (theme && theme !== 'midnight') {
          document.documentElement.setAttribute('data-theme', theme);
        }
      })();

      function copyCodeBlock(btn) {
        var code = btn.getAttribute('data-code');
        if (!code) return;
        navigator.clipboard.writeText(code).then(function() {
          btn.textContent = '\u2713';
          btn.classList.add('copied');
          setTimeout(function() {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 2000);
        }).catch(function() {
          btn.textContent = '\u2717';
          setTimeout(function() {
            btn.textContent = 'Copy';
          }, 2000);
        });
      }

      document.addEventListener('click', function(e) {
        var btn = e.target.closest('.code-copy-btn');
        if (btn) {
          copyCodeBlock(btn);
        }
      });
    </script>
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gitsidian</title>
    <script type="module" crossorigin src="./assets/index-BlZ4Uav3.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DeNkWF9n.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
